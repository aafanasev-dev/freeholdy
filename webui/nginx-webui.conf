# Web UI — serves the React control panel container at https://your_domain.com
# Manual system config (not generated by freeholdy).
# Install: sudo cp nginx-webui.conf /etc/nginx/sites-available/freeholdy_webui.conf
#          sudo ln -s /etc/nginx/sites-available/freeholdy_webui.conf /etc/nginx/sites-enabled/
#          sudo certbot certonly --nginx -d your_domain.com   # first issue (HTTP block must be live)
#          sudo nginx -t && sudo nginx -s reload

server {
    listen 80;
    server_name your_domain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name your_domain.com;

    ssl_certificate     /etc/letsencrypt/live/your_domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your_domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://127.0.0.1:14173;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
