# ws-chat — two services exposed by freeholdy:
#   web        -> web.{project}.{domain}        (React UI, static, nginx)
#   websocket  -> websocket.{project}.{domain}  (Node.js ws server)
# freeholdy rewrites these ports to loopback bindings and proxies them via nginx.
# The 'websocket' service name is what makes nginx emit WebSocket upgrade headers.
services:
  web:
    build:
      context: ./frontend
      args:
        # Set by install.sh's interactive pre phase (.env); default keeps the stack
        # buildable if the pre phase never ran.
        VITE_CHAT_NAME: ${CHAT_NAME:-ws-chat}
    ports:
      - "80"
  websocket:
    build: ./backend
    ports:
      - "8080"
