<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About · freeholdy</title>

  <!-- Simple React page: React + ReactDOM + Babel from CDN, no build step. -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --bg: #07070f; --s1: #0c0c1a; --s2: #111120; --bd: #1e1e32; --bdB: #2c2c48;
      --green: #3dd68c; --blue: #6aa3f5; --amber: #f0a835; --txt: #c8d0e8;
      --muted: #606880; --dim: #383d55;
      --ff: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--txt); font-family: var(--ff); line-height: 1.65; }
    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--bdB); border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const C = {
      green: "#3dd68c", blue: "#6aa3f5", amber: "#f0a835",
      txt: "#c8d0e8", muted: "#606880", dim: "#383d55",
      s1: "#0c0c1a", s2: "#111120", bd: "#1e1e32", bdB: "#2c2c48",
    };

    const Section = ({ title, children }) => (
      <section style={{ marginTop: 36 }}>
        <h2 style={{ color: C.muted, fontSize: 11, letterSpacing: "0.14em", fontWeight: 600, marginBottom: 14 }}>
          {title}
        </h2>
        {children}
      </section>
    );

    const Card = ({ title, children, accent }) => (
      <div style={{ background: C.s1, border: `1px solid ${C.bd}`, borderRadius: 3, padding: "14px 16px" }}>
        <div style={{ color: accent || C.green, fontSize: 13, fontWeight: 600, marginBottom: 6 }}>{title}</div>
        <div style={{ color: C.muted, fontSize: 12 }}>{children}</div>
      </div>
    );

    const Step = ({ n, code, children }) => (
      <li style={{ display: "flex", gap: 12, alignItems: "baseline", padding: "7px 0" }}>
        <span style={{ color: C.dim, fontSize: 12, minWidth: 18 }}>{n}</span>
        <div>
          <code style={{ color: C.green, fontSize: 12.5 }}>{code}</code>
          <div style={{ color: C.muted, fontSize: 12, marginTop: 2 }}>{children}</div>
        </div>
      </li>
    );

    const features = [
      ["One container per app", "A Dockerfile becomes a single container served at {name}.cloudopen.space.", C.green],
      ["Multi-container stacks", "A docker-compose.yml exposes each published service at {service}.{project}.cloudopen.space.", C.blue],
      ["Automatic HTTPS", "nginx + Let's Encrypt certificates are provisioned for every subdomain.", C.amber],
      ["Plugins", "Pre-packaged templates (this page is one) deploy with a single command.", C.green],
    ];

    function App() {
      const [hits, setHits] = useState(0);
      return (
        <div style={{ maxWidth: 760, margin: "0 auto", padding: "64px 22px 80px" }}>

          {/* Hero */}
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 10 }}>
            <span style={{ fontSize: 30 }}>🐾</span>
            <h1 style={{ color: C.green, fontSize: 30, letterSpacing: "-0.5px" }}>freeholdy</h1>
          </div>
          <p style={{ color: C.txt, fontSize: 15 }}>
            A FastAPI service that orchestrates Docker containers behind nginx + Let's Encrypt on a
            single VPS, exposing each project as <span style={{ color: C.blue }}>*.cloudopen.space</span>.
          </p>
          <p style={{ color: C.muted, fontSize: 12.5, marginTop: 8 }}>
            Push a Dockerfile or a docker-compose.yml, and freeholdy allocates a subdomain, wires up
            the reverse proxy, issues a TLS certificate, and runs your container — all from one API.
          </p>

          {/* Features */}
          <Section title="WHAT IT DOES">
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              {features.map(([t, d, a]) => <Card key={t} title={t} accent={a}>{d}</Card>)}
            </div>
          </Section>

          {/* How */}
          <Section title="DEPLOY A PROJECT">
            <ol style={{ listStyle: "none", background: C.s1, border: `1px solid ${C.bd}`, borderRadius: 3, padding: "10px 16px" }}>
              <Step n="1" code="fhold create myapp">Create an empty project.</Step>
              <Step n="2" code="fhold upload myapp ./myapp">
                Upload a file or folder. The root is scanned for a Dockerfile or docker-compose.yml —
                that picks the deploy mode automatically (compose wins) and provisions nginx + SSL.
              </Step>
              <Step n="3" code="fhold build myapp && fhold start myapp">
                Build the image and start the container (or <code style={{ color: C.green }}>fhold compose-up</code> for a stack).
              </Step>
            </ol>
          </Section>

          {/* Stack */}
          <Section title="BUILT WITH">
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
              {["FastAPI", "SQLite", "Docker", "nginx", "Let's Encrypt", "React", "Vite"].map(t => (
                <span key={t} style={{ background: C.s2, border: `1px solid ${C.bdB}`, borderRadius: 3, padding: "3px 10px", fontSize: 11.5, color: C.txt }}>{t}</span>
              ))}
            </div>
          </Section>

          {/* Tiny bit of interactivity to prove it's really React */}
          <Section title="IS THIS REALLY REACT?">
            <button
              onClick={() => setHits(h => h + 1)}
              style={{ background: "#182e22", color: C.green, border: "1px solid #254838", borderRadius: 3,
                       fontFamily: "inherit", fontSize: 12, padding: "6px 14px", cursor: "pointer" }}>
              clicked {hits} time{hits === 1 ? "" : "s"}
            </button>
            <span style={{ color: C.dim, fontSize: 11.5, marginLeft: 10 }}>
              this counter is React state — rendered client-side.
            </span>
          </Section>

          <footer style={{ marginTop: 44, paddingTop: 16, borderTop: `1px solid ${C.bd}`, color: C.dim, fontSize: 11 }}>
            served by freeholdy · the <span style={{ color: C.muted }}>about</span> plugin ·{" "}
            <a href="https://ui.cloudopen.space">control panel →</a>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
